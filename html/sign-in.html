<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Sign In</title>
  <link rel="stylesheet" href="../css/form.css" />

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <div id="navbar-container"></div>

  <form class="card" id="loginForm" method="post" action="../index.html">
    <h1>Sign In</h1>
    <p class="subtitle">Welcome back! Please login to your account</p>

    <!-- Email -->
    <div class="form-group">
      <label for="loginEmail">Email</label>
      <div class="input-box">
        <input
          type="email"
          id="loginEmail"
          placeholder="Enter your email"
          required
          pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          title="Please enter a valid email" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="loginPassword">Password</label>
      <div class="input-box">
        <input
          type="password"
          id="loginPassword"
          placeholder="••••••••"
          required
          title="Password must contain at least 8 characters, one uppercase letter, one lowercase letter, and one number" />
      </div>
    </div>

    <!-- Forgot password -->
    <div class="forgot">
      <a href="../html/reset.html">Forgot Password?</a>
    </div>

    <button type="submit" class="btn">Sign In</button>

    <div class="footer-text">
      Don't have an account?
      <a href="../html/sign-up.html">Sign Up</a>
    </div>
  </form>

  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
</body>

</html>
